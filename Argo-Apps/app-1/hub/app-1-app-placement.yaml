apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: app1-app-placement
  namespace: openshift-gitops
spec:
  clusterSets:
    - dev-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In 
              values: 
                - 'OpenShift'
            - key: local-cluster
              operator: NotIn
              values:
                - 'true'